name: Build and Deploy

on:
  push:
    branches: [ staging ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - uses: docker/setup-buildx-action@v3

      # - name: Inspect secret length (safe)
      #   env:
      #     DOCKER_USER: ${{ secrets.DOCKER_USER }}
      #     DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      #   run: |
      #     echo "USER LENGTH: ${#DOCKER_USER}"
      #     echo "PASS LENGTH: ${#DOCKER_PASSWORD}"

      - name: Login to Docker Hub
        # uses: docker/login-action@v3
        # with: 
        #   username: ${{ secrets.DOCKER_USER }}
        #   password: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login -u "${{ secrets.DOCKER_USER }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Debug
        run: |
          cat ~/.docker/config.json
          docker info | grep -i username
          docker pull hello-world
          echo "Image name: ${{ secrets.DOCKER_USER }}/cdss-api:${{ github.sha }}"

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USER }}/cdss-api:${{ github.sha }} .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USER }}/cdss-api:${{ github.sha }}

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Update K8s Deployment
        run: |
          kubectl set image deployment/cdss-api-app \
            cdss-api=${{ secrets.DOCKER_USER }}/cdss-api:${{ github.sha }} \
            --record

      - name: Verify Rollout
        run: kubectl rollout status deployment/cdss-api-app --timeout=120s

      - name: Rollback on Failure
        if: failure()
        run: kubectl rollout undo deployment/cdss-api-app