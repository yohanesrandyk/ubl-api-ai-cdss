name: Build and Deploy
on:
  push:
    branches: [ staging ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
        
      - name: Build Docker Image
        run: docker build -t yohanesrandyk/cdss-api:${{ github.sha }} .

      - name: Logout & Login Docker Hub
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker logout | echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
          docker push yohanesrandyk/cdss-api:${{ github.sha }}

      - name: Push to Docker Hub
        run: |
          docker push yohanesrandyk/cdss-api:${{ github.sha }}

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted # This would be your Ubuntu machine
    steps:
      - name: Update K8s
        run: |
          kubectl set image deployment/cdss-api-app cdss-api=yohanesrandyk/cdss-api:${{ github.sha }}
